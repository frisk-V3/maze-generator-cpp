name: Build CMake Maze GUI Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 各OSごとの事前準備（GLFWのインストール） ---
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y xorg-dev libgl1-mesa-dev libglu1-mesa-dev libglfw3-dev

    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install glfw

    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Windowsの環境構築（標準設定をそのまま利用）
        echo "Initializing Windows..."

    # --- CMakeを使った共通のビルド手順 ---
    - name: Configure CMake
      run: |
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          cmake -B build -DCMAKE_PREFIX_PATH=$(brew --prefix glfw)
        else
          cmake -B build
        fi
      shell: bash

    - name: Build Project
      run: cmake --build build --config Release

    # --- 成果物の保存 ---
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MazeGenerator-CMake-${{ matrix.os }}
        path: |
          build/MazeGenerator
          build/MazeGenerator.exe
          build/Release/MazeGenerator.exe
